name: byerag
networks:
  internal:
    driver: bridge
    internal: false
  sandbox-egress:
    driver: bridge
    internal: true
volumes:
  postgres-data:
  convex-data:
  clamav-data:
services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: convex
      POSTGRES_DB: byerag_self_hosted
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks: [internal]
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U convex -d byerag_self_hosted']
      interval: 10s
      timeout: 5s
      retries: 12
  convex-backend:
    image: ghcr.io/get-convex/convex-backend:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      INSTANCE_NAME: byerag-self-hosted
      INSTANCE_SECRET: ${INSTANCE_SECRET}
      DB_PASSWORD: ${DB_PASSWORD}
      POSTGRES_URL: ${POSTGRES_URL}
      DISABLE_BEACON: 'true'
      CONVEX_CLOUD_ORIGIN: ${CONVEX_CLOUD_ORIGIN}
      CONVEX_SITE_ORIGIN: ${CONVEX_SITE_ORIGIN}
      DO_NOT_REQUIRE_SSL: ${DO_NOT_REQUIRE_SSL}
      RUST_LOG: ${RUST_LOG}
      ACTIONS_USER_TIMEOUT_SECS: '86400'
      HTTP_SERVER_TIMEOUT_SECONDS: '86400'
    volumes:
      - convex-data:/convex/data
    ports:
      - '127.0.0.1:3210:3210'
      - '127.0.0.1:3211:3211'
    networks: [internal, sandbox-egress]
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3210/version']
      interval: 10s
      timeout: 5s
      retries: 12
  clamav:
    image: clamav/clamav-debian:latest
    restart: unless-stopped
    volumes:
      - clamav-data:/var/lib/clamav
    networks: [internal]
    healthcheck:
      test: ['CMD', 'clamdcheck.sh']
      interval: 30s
      timeout: 10s
      retries: 12
